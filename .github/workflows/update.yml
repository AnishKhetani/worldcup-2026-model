name: Update predictions & deploy

# Re-pull data, re-run the model, rebuild the site and deploy to GitHub Pages.
# Runs once a day at 07:00 UTC, after the upstream CC0 datasets have recorded the
# previous day's results. Also runnable on demand.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["src/**", ".github/workflows/update.yml"]

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pull the latest World Cup + international data (best-effort; the build below is
      # the real gate — it fails loudly if the required CC0 data is missing).
      - name: Fetch latest data
        working-directory: src
        run: python wc_fetch.py --force || true

      # Hard gate: block the deploy if the data violates a core invariant (missing file,
      # duplicate match_id, completed-but-scoreless match) rather than shipping a broken
      # or empty site. A failure here leaves the last good deploy in place.
      - name: Validate data
        working-directory: src
        run: python wc_validate.py

      - name: Build predictions + site
        working-directory: src
        run: python build_site.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
